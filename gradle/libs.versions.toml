[versions]
agp = "8.5.0"
kotlin = "1.9.22"
chaquopy = "17.0.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
appcompat = "1.7.0"
material = "1.12.0"
activity = "1.8.0"
constraintlayout = "2.2.1"
recyclerview = "1.3.2"
workRuntime = "2.9.0"
rhino = "1.7.15"
gson = "2.10.1"
