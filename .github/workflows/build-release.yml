name: Build and Release Scriptler APK

on:
  push:
    branches:
      - main
    paths:
      - 'prebundled_packages.txt'    # Trigger when the package list changes
      - 'app/**'                     # Trigger when app code changes
  workflow_dispatch:                 # Allows manual trigger

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code with depth 2 to access commit history for release notes
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 2. Setup Python Environment (Required by Chaquopy to install pip packages during build)
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Setup Java Environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 4. Extract Metadata for File Naming and Release Body
      - name: Extract Modules and Commit Info
        id: info
        run: |
          MODULES_STR="base"
          if [ -f "prebundled_packages.txt" ]; then
            MODULES=$(sed 's/\/\/.*//g' prebundled_packages.txt | grep -v '^#' | grep -v '^\s*$' | tr '\n' ' ' | xargs | tr ' ' '_')
            if [ ! -z "$MODULES" ]; then
              MODULES_STR="$MODULES"
            fi
          fi
          echo "modules_str=$MODULES_STR" >> $GITHUB_OUTPUT          

          CURRENT_MSG=$(git log -1 --pretty=format:"%s%n%n%b")
          PREVIOUS_MSG=$(git log -1 --skip=1 --pretty=format:"%s%n%n%b" || echo "Initial Repository Setup")
          
          {
            echo "current_commit_msg<<EOF"
            echo "$CURRENT_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          {
            echo "previous_commit_msg<<EOF"
            echo "$PREVIOUS_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # 5. Handle Versioning (Original bumps version, Fork keeps version)
      - name: Handle Versioning Logic
        id: version_logic
        run: |
          GRADLE_FILE="app/build.gradle"
          
          CURRENT_VERSION_CODE=$(grep -E 'versionCode\s+[0-9]+' $GRADLE_FILE | awk '{print $2}')
          CURRENT_VERSION_NAME=$(grep -E 'versionName\s+".*"' $GRADLE_FILE | awk '{print $2}' | tr -d '"')
          
          IS_FORK="${{ github.event.repository.fork }}"
          REPO_OWNER="${{ github.repository_owner }}"
          
          if [ "$IS_FORK" = "false" ]; then
            echo "Building in MAIN repo. Bumping version..."
            
            NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
            NEW_VERSION_NAME=$(echo $CURRENT_VERSION_NAME | awk -F. '{$NF = $NF + 1;} 1' | sed 's/ /./g')
            
            sed -i "s/versionCode $CURRENT_VERSION_CODE/versionCode $NEW_VERSION_CODE/" $GRADLE_FILE
            sed -i "s/versionName \"$CURRENT_VERSION_NAME\"/versionName \"$NEW_VERSION_NAME\"/" $GRADLE_FILE
            
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add $GRADLE_FILE
            git commit -m "chore: bump version to $NEW_VERSION_NAME ($NEW_VERSION_CODE) [skip ci]"
            git push
            
            echo "version_tag=v${NEW_VERSION_NAME}" >> $GITHUB_OUTPUT
            echo "apk_prefix=" >> $GITHUB_OUTPUT
          else
            echo "Building in FORK. Using current version."
            echo "version_tag=v${CURRENT_VERSION_NAME}" >> $GITHUB_OUTPUT
            echo "apk_prefix=${REPO_OWNER}_" >> $GITHUB_OUTPUT
          fi

      # 5.5. Resolve Chaquopy and Python versions based on prebundled_packages.txt
      - name: Resolve build configuration
        run: python scripts/resolve-build-config.py

      # 5.6. Install the resolved Python version (Chaquopy requires it at build time)
      - name: Read resolved Python version
        id: resolved_python
        run: |
          PYTHON_VERSION="3.10"
          if [ -f app/build-config.properties ]; then
            PYTHON_VERSION=$(grep 'pythonVersion=' app/build-config.properties | cut -d'=' -f2)
          fi
          echo "version=$PYTHON_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python ${{ steps.resolved_python.outputs.version }}
        uses: actions/setup-python@v5
        with:
          python-version: '${{ steps.resolved_python.outputs.version }}'

      # 6. Build the APK
      - name: Build Custom APK
        run: ./gradlew assembleDebug

      # 7. Rename APK (Owner_scriptler_vx-x-x_modules.apk)
      - name: Rename APK Output
        id: rename_apk
        run: |
          VERSION_TAG="${{ steps.version_logic.outputs.version_tag }}"
          VERSION_PART="${VERSION_TAG//./-}" # v1.0.0 -> v1-0-0
          MODULES_PART="${{ steps.info.outputs.modules_str }}"
          PREFIX="${{ steps.version_logic.outputs.apk_prefix }}"
          
          NEW_APK_NAME="${PREFIX}scriptler_${VERSION_PART}_${MODULES_PART}.apk"
          
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/$NEW_APK_NAME
          echo "apk_path=app/build/outputs/apk/debug/$NEW_APK_NAME" >> $GITHUB_OUTPUT

      # 8. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Unique tag for forks using run_id ensures no collisions
          tag_name: ${{ steps.version_logic.outputs.version_tag }}-${{ github.run_id }}
          name: Scriptler ${{ steps.version_logic.outputs.version_tag }}
          body: |
            ### Base Code Details
            **Version:** `${{ steps.version_logic.outputs.version_tag }}`
            **Base Commit Info:**
            > ${{ steps.info.outputs.previous_commit_msg }}
            
            ### Customization Details
            **Pre-built Native Modules:** 
            `${{ steps.info.outputs.modules_str }}`
            
            **Custom Changes in this Build:**
            > ${{ steps.info.outputs.current_commit_msg }}
            
            ---
            *This is an automated debug build. This APK is signed with a generic debug key.*
          files: ${{ steps.rename_apk.outputs.apk_path }}